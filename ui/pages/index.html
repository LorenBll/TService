<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TService</title>
    <link rel="stylesheet" href="/ui/css/index.css">
</head>
<body>
    <div class="page">
        <div class="hero">
            <h1 class="title init-hidden"><a href="#" class="title-link">TService</a></h1>
            <p class="subtitle init-hidden">This project is a template.</p>
        </div>

        <main class="card init-hidden" id="card">
        </main>
    </div>

    <script>
        const card = document.getElementById('card');

        function triggerLoadIn() {
            var items = [
                { el: document.querySelector('.title'), delay: 0 },
                { el: document.querySelector('.subtitle'), delay: 0.15 },
                { el: document.getElementById('card'), delay: 0.3 }
            ];

            requestAnimationFrame(function() {
                items.forEach(function(item) {
                    if (!item.el) return;
                    item.el.style.animationDelay = item.delay + 's';
                    item.el.classList.remove('init-hidden');
                    item.el.classList.add('load-in');
                    item.el.addEventListener('animationend', function() {
                        this.classList.remove('load-in');
                        this.style.animationDelay = '';
                    }, { once: true });
                });
            });
        }

        triggerLoadIn();
    </script>
</body>
</html>
